  {l:"RVSL 24",c:"rvsl",t:"FT 1.0",d:"Reversal different cycle - prepaid balance",cy:[["2026-06-15","2026-06-19","2026-06-23"],["2026-06-20","2026-06-24","2026-06-28"]]},
  {l:"RVSL 25",c:"rvsl",t:"FT 1.0",d:"Reversal same cycle - revolver",cy:[["2026-06-29","2026-07-03","2026-07-07"],["2026-07-04","2026-07-08","2026-07-12"]]},
  {l:"RVSL 26",c:"rvsl",t:"FT 1.0",d:"Reversal different cycle - late",cy:[["2026-06-24","2026-06-28","2026-07-02"],["2026-06-29","2026-07-03","2026-07-07"]]},
  {l:"RVSL 27",c:"rvsl",t:"FT 1.0",d:"Reversal different cycle - reversal > outstanding",cy:[["2026-07-06","2026-07-10","2026-07-14"],["2026-07-11","2026-07-15","2026-07-19"]]},
  {l:"RVSL 28",c:"rvsl",t:"FT 1.0",d:"Partial reversals",cy:[["2026-06-24","2026-06-28","2026-07-02"],["2026-06-29","2026-07-03","2026-07-07"]]},
  {l:"RVSL 29",c:"rvsl",t:"FT 1.0",d:"Partial reversals - interest reversal",cy:[["2026-07-04","2026-07-08","2026-07-12"],["2026-07-09","2026-07-13","2026-07-17"]]},
  {l:"OTH 30",c:"oth",t:"FT 1.0",d:"Usage of prepaid balance for new purchases",cy:[["2026-07-04","2026-07-08","2026-07-12"],["2026-07-09","2026-07-13","2026-07-17"]]},
  {l:"OTH 31",c:"oth",t:"FT 1.0",d:"Overlimit balance",cy:[["2026-06-25","2026-06-29","2026-07-03"],["2026-06-30","2026-07-04","2026-07-08"]]},
  {l:"OTH 32",c:"oth",t:"FT 1.0",d:"Manual adjustment",cy:[["2026-07-09","2026-07-13","2026-07-17"],["2026-07-14","2026-07-18","2026-07-22"]]}
];

var HOL_BR = {"2026-04-21":"Tiradentes","2026-05-01":"Labor Day","2026-06-04":"Corpus Christi"};
var HOL_US = {"2026-05-25":"Memorial Day","2026-06-19":"Juneteenth","2026-07-03":"Independence Day (obs)"};

var filt = "all";
var PPD = 14, BH = 24, CW = 100;
var MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DN = ["S","M","T","W","T","F","S"];
var CN = {rev:"Revolving","2lat":"2nd Late",lat:"Lateness",rvsl:"Reversal",oth:"Others"};
var T0,T1;

function pad2(n){return n<10?"0"+n:String(n)}
function dayKey(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())}
function dayType(d){
  var k=dayKey(d);
  if(HOL_BR[k])return "br";
  if(HOL_US[k])return "us";
  var dow=d.getDay();if(dow===0||dow===6)return "we";
  return null;
}
function dayLabel(d){var k=dayKey(d);return HOL_BR[k]||HOL_US[k]||null}
function dBetween(a,b){return Math.round((b-a)/864e5)}
function pD(s){var p=s.split("-");return new Date(+p[0],p[1]-1,+p[2])}
function fmt(d){return MN[d.getMonth()]+" "+d.getDate()}
function nDays(){return dBetween(T0,T1)+1}
function tW(){return nDays()*PPD}

function computeRange(){
  var mn=Infinity,mx=-Infinity;
  var all=S_STG.concat(S_PRD);
  for(var i=0;i<all.length;i++){for(var j=0;j<all[i].cy.length;j++){
    var ta=pD(all[i].cy[j][0]).getTime(),tb=pD(all[i].cy[j][2]).getTime();
    if(ta<mn)mn=ta;if(tb>mx)mx=tb;
  }}
  T0=new Date(mn);T1=new Date(mx);
}

function buildPairs(){
  var map={};
  for(var i=0;i<S_STG.length;i++){var s=S_STG[i];var k=s.l.replace(/\s+0/," ");map[k]={stg:s,prd:null}}
  for(var i=0;i<S_PRD.length;i++){var s=S_PRD[i];var k=s.l.replace(/\s+0/," ");if(map[k])map[k].prd=s;else map[k]={stg:null,prd:s}}
  var order=[];
  for(var i=0;i<S_STG.length;i++){var k=S_STG[i].l.replace(/\s+0/," ");if(order.indexOf(k)===-1)order.push(k)}
  for(var i=0;i<S_PRD.length;i++){var k=S_PRD[i].l.replace(/\s+0/," ");if(order.indexOf(k)===-1)order.push(k)}
  var list=[];
  for(var i=0;i<order.length;i++)list.push(map[order[i]]);
  return list;
}

function render(){
  var sc=document.getElementById("sc"),w=tW();
  var pairs=buildPairs();
  var filtered=[];
  for(var i=0;i<pairs.length;i++){
    var p=pairs[i],cat=(p.stg||p.prd).c;
    if(filt!=="all"&&cat!==filt)continue;
    filtered.push(p);
  }
  if(!filtered.length){sc.innerHTML='<div style="padding:40px;text-align:center;color:#90a4ae">No scenarios to display.</div>';return}

  var html='<div class="chart-inner" style="width:'+(CW+w)+'px">';
  html+='<div class="header-band"><div class="corner">Scenario</div><div class="date-cols" style="width:'+w+'px">';
  html+='<div class="month-row">';
  var spans=[],cur=new Date(T0),pm=-1,ms=0;
  while(cur<=T1){var mo=cur.getMonth();if(mo!==pm){if(pm!==-1)spans.push({m:pm,y:cur.getFullYear(),s:ms,e:dBetween(T0,cur)});ms=dBetween(T0,cur);pm=mo}cur.setDate(cur.getDate()+1)}
  spans.push({m:pm,y:T1.getFullYear(),s:ms,e:nDays()});
  for(var si=0;si<spans.length;si++)html+='<div class="month-cell" style="width:'+((spans[si].e-spans[si].s)*PPD)+'px">'+MN[spans[si].m]+' '+spans[si].y+'</div>';
  html+='</div><div class="wday-row">';
  cur=new Date(T0);while(cur<=T1){var dt0=dayType(cur),wdcls="wday-cell";if(dt0)wdcls+=" wc-"+dt0;
  html+='<div class="'+wdcls+'" style="width:'+PPD+'px">'+DN[cur.getDay()]+'</div>';cur.setDate(cur.getDate()+1)}
  html+='</div><div class="day-row">';
  cur=new Date(T0);while(cur<=T1){var isMS=cur.getDate()===1;
  var dt=dayType(cur),dcls=isMS?"week-cell mon-start":"week-cell";if(dt)dcls+=" wc-"+dt;
  var dtip=dayLabel(cur);var dtipAttr=dtip?' title="'+dtip+'"':'';
  html+='<div class="'+dcls+'"'+dtipAttr+' style="width:'+PPD+'px">'+cur.getDate()+'</div>';cur.setDate(cur.getDate()+1)}
  html+='</div></div></div>';

  for(var fi=0;fi<filtered.length;fi++){
    var p=filtered[fi],stg=p.stg,prd=p.prd;
    var stgN=stg?stg.cy.length:0,prdN=prd?prd.cy.length:0;
    var rows=Math.max(stgN,prdN),h=rows*BH;
    var lbl=(stg||prd).l,cat=(stg||prd).c;

    html+='<div class="cust-row"><div class="cust-label" style="height:'+h+'px">'+lbl+'</div>';
    html+='<div class="cust-gantt" style="width:'+w+'px;height:'+h+'px">';

    cur=new Date(T0);while(cur<=T1){var dd=dBetween(T0,cur);var dty=dayType(cur);
    if(dty==="we")html+='<div class="day-bg bg-we" style="left:'+(dd*PPD)+'px;width:'+PPD+'px"></div>';
    else if(dty)html+='<div class="day-mark dm-'+dty+'" style="left:'+(dd*PPD+Math.floor(PPD/2))+'px"></div>';
    if(cur.getDate()===1)html+='<div class="gridline gl-month" style="left:'+(dd*PPD)+'px"></div>';
    else if(cur.getDay()===1)html+='<div class="gridline gl-week" style="left:'+(dd*PPD)+'px"></div>';
    cur.setDate(cur.getDate()+1)}

    for(var j=0;j<rows;j++){
      if(stg&&j<stgN){
        var sd=pD(stg.cy[j][0]),cd=pD(stg.cy[j][1]),ed=pD(stg.cy[j][2]);
        var gs=new Date(cd);gs.setDate(gs.getDate()+1);
        var off=dBetween(T0,sd),span=dBetween(sd,ed)+1;
        var left=off*PPD,bw=Math.max(span*PPD-4,20),top=j*BH+2;
        var totalD=dBetween(sd,ed)+1,billD=dBetween(sd,cd)+1;
        var pct=totalD>0?((billD/totalD)*100).toFixed(1):50;
        var col=CLR[cat]||CLR.lat;
        var bg="linear-gradient(to right,"+col[0]+" "+pct+"%,"+col[1]+" "+pct+"%)";
        var txt="S:C"+j+" \u2022 "+fmt(sd)+"\u2013"+fmt(ed);
        html+='<div class="bar" style="left:'+left+'px;width:'+bw+'px;top:'+top+'px;background:'+bg+';color:'+col[2]+'"'
          +' data-l="'+stg.l+'" data-c="'+cat+'" data-t="'+stg.t+'" data-d="'+stg.d.replace(/"/g,'&quot;')+'"'
          +' data-n="'+(j+1)+'" data-j="'+j+'" data-s="'+fmt(sd)+'" data-e="'+fmt(ed)+'" data-m="'+fmt(cd)+'" data-gs="'+fmt(gs)+'" data-env="STG">'
          +'<span class="bt">'+txt+'</span></div>';
      }
      if(prd&&j<prdN){
        var sd=pD(prd.cy[j][0]),cd=pD(prd.cy[j][1]),ed=pD(prd.cy[j][2]);
        var gs=new Date(cd);gs.setDate(gs.getDate()+1);
        var off=dBetween(T0,sd),span=dBetween(sd,ed)+1;
        var left=off*PPD,bw=Math.max(span*PPD-4,20),top=j*BH+2;
        var totalD=dBetween(sd,ed)+1,billD=dBetween(sd,cd)+1;
        var pct=totalD>0?((billD/totalD)*100).toFixed(1):50;
        var col=CLR[cat]||CLR.lat;
        var bg="linear-gradient(to right,"+col[0]+" "+pct+"%,"+col[1]+" "+pct+"%)";
        var txt="P:C"+j+" \u2022 "+fmt(sd)+"\u2013"+fmt(ed);
        html+='<div class="bar bar-prd" style="left:'+left+'px;width:'+bw+'px;top:'+top+'px;background:'+bg+';color:'+col[2]+'"'
          +' data-l="'+prd.l+'" data-c="'+cat+'" data-t="'+prd.t+'" data-d="'+prd.d.replace(/"/g,'&quot;')+'"'
          +' data-n="'+(j+1)+'" data-j="'+j+'" data-s="'+fmt(sd)+'" data-e="'+fmt(ed)+'" data-m="'+fmt(cd)+'" data-gs="'+fmt(gs)+'" data-env="PROD">'
          +'<span class="bt">'+txt+'</span></div>';
      }
    }
    html+='</div></div>';
    if(fi<filtered.length-1)html+='<div class="cust-sep"><div class="cust-sep-left"></div><div class="cust-sep-right" style="width:'+w+'px"></div></div>';
  }
  html+='</div>';sc.innerHTML=html;
}

var tt=document.getElementById("tt");
document.addEventListener("pointerover",function(e){
  var b=e.target.closest(".bar");if(!b){tt.style.display="none";return}var d=b.dataset;
  tt.innerHTML='<div class="tl">'+d.l+' \u2014 '+d.env+' Cycle '+d.n+' (C'+d.j+')</div>'
    +'<div class="tc">'+d.env+' \u00b7 '+CN[d.c]+' \u00b7 '+d.t+'</div>'
    +'<div class="td">Billing: '+d.s+' \u2013 '+d.m+' &nbsp;\u00b7&nbsp; Grace: '+d.gs+' \u2013 '+d.e+'</div>'
    +'<div class="tp">'+d.d.replace(/</g,"&lt;")+'</div>';
  tt.style.display="block"
});
document.addEventListener("pointermove",function(e){
  if(tt.style.display!=="block")return;var x=e.clientX+14,y=e.clientY+14;
  if(x+tt.offsetWidth>innerWidth-10)x=e.clientX-tt.offsetWidth-10;
  if(y+tt.offsetHeight>innerHeight-10)y=e.clientY-tt.offsetHeight-10;
  tt.style.left=x+"px";tt.style.top=y+"px"
});
document.addEventListener("pointerout",function(e){
  if(e.target.closest(".bar")&&!e.relatedTarget?.closest(".bar"))tt.style.display="none"
});

document.querySelectorAll("[data-cat]").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll("[data-cat]").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");filt=btn.dataset.cat;render()
  })
});

computeRange();render();
</script>
</body>
</html>

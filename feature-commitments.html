<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feature Commitment Timeline — Beta E2E Testing</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f8f9fa;color:#333;font-size:13px;line-height:1.4}

.nav-bar{display:flex;align-items:center;gap:10px;padding:6px 24px;background:#6a1b9a;color:#f3e5f5;font-size:12px}
.nav-bar a{color:#fff;text-decoration:none;padding:5px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.35);transition:all .15s;font-weight:500}
.nav-bar a:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.6)}
.nav-env{color:rgba(255,255,255,.7);margin-left:4px}
.top-bar{padding:20px 24px 12px;background:#fff;border-bottom:1px solid #e0e0e0}
.top-bar h1{font-size:20px;font-weight:600;color:#1a1a1a}
.top-bar p{font-size:13px;color:#666;margin-top:4px}
.controls{display:flex;gap:16px;padding:10px 24px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;align-items:center}
.legend-title{font-weight:600;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
.legend-swatch{width:28px;height:14px;border-radius:3px;flex-shrink:0}
.sep{width:1px;height:20px;background:#ddd;margin:0 4px}
.filter-btn{padding:4px 12px;font-size:12px;border:1px solid #d0d0d0;border-radius:14px;background:#fff;cursor:pointer;color:#555;transition:all .15s}
.filter-btn:hover{border-color:#999}
.filter-btn.active{background:#37474f;color:#fff;border-color:#37474f}
.phase-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.phase-swatch{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,.15)}

.scroll-container{overflow:auto;max-height:calc(100vh - 200px);background:#fff;position:relative}
.chart-inner{position:relative}
.header-band{position:sticky;top:0;z-index:15;display:flex;background:#fff;border-bottom:1px solid #d0d0d0}
.corner{flex:0 0 260px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#78909c;text-transform:uppercase;letter-spacing:.5px;background:#fafafa;border-right:1px solid #e0e0e0;position:sticky;left:0;z-index:20}
.date-cols{position:relative}
.month-row{display:flex;height:24px;border-bottom:1px solid #f0f0f0}
.month-cell{display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#37474f;border-left:1px solid #e0e0e0;text-transform:uppercase;letter-spacing:.5px}
.month-cell:first-child{border-left:none}
.wday-row{display:flex;height:16px;border-bottom:1px solid #f0f0f0}
.wday-cell{display:flex;align-items:center;justify-content:center;font-size:9px;color:#b0b0b0;letter-spacing:.3px;text-transform:uppercase}
.day-row{display:flex;height:22px}
.week-cell{display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;border-left:1px solid #f0f0f0}
.week-cell.mon-start{border-left:1px solid #ccc;color:#666;font-weight:600}

.feat-row{display:flex}
.feat-label{flex:0 0 260px;display:flex;align-items:center;padding:0 12px;font-weight:500;font-size:12px;color:#37474f;background:#fafafa;border-right:1px solid #e0e0e0;position:sticky;left:0;z-index:10;border-bottom:1px solid #eee;gap:8px}
.feat-label .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.feat-gantt{position:relative;border-bottom:1px solid #eee}
.group-sep{display:flex;height:28px}
.group-sep-left{flex:0 0 260px;display:flex;align-items:center;padding:0 12px;background:#eceff1;border-right:1px solid #e0e0e0;position:sticky;left:0;z-index:10;font-weight:700;font-size:11px;color:#546e7a;text-transform:uppercase;letter-spacing:.5px}
.group-sep-right{flex:1;background:#eceff1}

.day-bg{position:absolute;top:0;bottom:0;pointer-events:none;z-index:0}
.day-bg.bg-we{background:rgba(0,0,0,.05)}
.day-mark{position:absolute;top:0;bottom:0;width:0;pointer-events:none;z-index:0}
.day-mark.dm-br{border-left:2px dashed rgba(126,87,194,.55)}
.day-mark.dm-us{border-left:2px dashed rgba(230,140,0,.6)}
.gridline{position:absolute;top:0;bottom:0;width:1px;z-index:0;pointer-events:none}
.gridline.gl-month{background:rgba(0,0,0,.1)}
.gridline.gl-week{background:rgba(0,0,0,.04)}
.wc-we{background:rgba(0,0,0,.06)}
.wc-br{background:rgba(126,87,194,.12)}
.wc-us{background:rgba(230,140,0,.12)}

.bar{position:absolute;height:16px;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;transition:filter .12s,box-shadow .12s;z-index:2}
.bar:hover{filter:brightness(.88);box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:3}
.bar .bt{overflow:hidden;text-overflow:ellipsis}

.today-line{position:absolute;top:0;bottom:0;width:2px;background:#d32f2f;z-index:6;pointer-events:none}
.today-label{position:absolute;top:-20px;font-size:9px;font-weight:700;color:#d32f2f;white-space:nowrap;transform:translateX(-50%);z-index:7;pointer-events:none;text-transform:uppercase;letter-spacing:.3px}

.tooltip{position:fixed;max-width:380px;padding:12px 16px;background:#263238;color:#eceff1;border-radius:6px;font-size:12px;line-height:1.5;pointer-events:none;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none}
.tooltip .tl{font-weight:700;font-size:13px;margin-bottom:4px}
.tooltip .tc{font-size:11px;color:#90a4ae;text-transform:uppercase;letter-spacing:.4px}
.tooltip .td{margin-top:6px;font-size:11px;color:#80cbc4}
.tooltip .ts{margin-top:6px;color:#b0bec5;font-size:11px}
.tooltip .ts b{color:#eceff1}
</style>
</head>
<body>

<div class="nav-bar">
  <a href="index.html">Home</a>
  <a href="staging.html">Staging</a>
  <a href="production.html">Production</a>
  <a href="combined.html">Combined</a>
  <span class="nav-env">FEATURE COMMITMENTS</span>
</div>

<div class="top-bar">
  <h1>Feature Commitment Timeline</h1>
  <p>System capabilities required for Beta E2E Testing &middot; Deadlines by environment (STG / PROD)</p>
</div>

<div class="controls">
  <span class="legend-title">Environment</span>
  <span class="legend-item"><span class="legend-swatch" style="background:#ce93d8"></span>STG (Staging)</span>
  <span class="legend-item"><span class="legend-swatch" style="background:#6a1b9a"></span>PROD (Production)</span>
  <span class="sep"></span>
  <span class="phase-legend"><span class="phase-swatch" style="background:rgba(0,0,0,.07)"></span>Weekend</span>
  <span class="phase-legend"><span class="phase-swatch" style="background:transparent;border-left:3px dashed rgba(126,87,194,.6)"></span>BR Holiday</span>
  <span class="phase-legend"><span class="phase-swatch" style="background:transparent;border-left:3px dashed rgba(230,140,0,.65)"></span>US Holiday</span>
  <span class="phase-legend"><span class="phase-swatch" style="background:#d32f2f;width:3px;border-radius:1px"></span>Today</span>
</div>

<div class="controls" id="filterRow">
  <span class="legend-title">Category</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="core">Core Billing</button>
  <button class="filter-btn" data-cat="revolving">Revolving</button>
  <button class="filter-btn" data-cat="lateness">Lateness</button>
  <button class="filter-btn" data-cat="reversal">Reversals</button>
  <button class="filter-btn" data-cat="other">Other</button>
  <span class="sep"></span>
  <span class="legend-title">Environment</span>
  <button class="filter-btn active" data-env="both">Both</button>
  <button class="filter-btn" data-env="stg">STG Only</button>
  <button class="filter-btn" data-env="prod">PROD Only</button>
</div>

<div class="scroll-container" id="sc"></div>
<div class="tooltip" id="tt"></div>

<script>
var FEATURES = [
  {g:"Core Billing"},
  {n:"Purchases + Bill Close + Statement",cat:"core",
    stg:{start:"2026-04-20",end:"2026-06-11"},
    prod:{start:"2026-06-01",end:"2026-08-12"},
    sc:"REV 1\u20137, LAT 8\u201316, 2LAT 17\u201320, RVSL 21\u201329, OTH 30\u201332"},
  {n:"Payment Processing (min / partial / full)",cat:"core",
    stg:{start:"2026-04-20",end:"2026-06-11"},
    prod:{start:"2026-06-01",end:"2026-08-12"},
    sc:"REV 1\u20137, LAT 8\u201316, 2LAT 17\u201320"},

  {g:"Revolving"},
  {n:"Revolving Interest Calculation",cat:"revolving",
    stg:{start:"2026-04-20",end:"2026-05-09"},
    prod:{start:"2026-06-01",end:"2026-07-14"},
    sc:"REV 1\u20137"},
  {n:"Revolving Flag (ON / OFF)",cat:"revolving",
    stg:{start:"2026-04-20",end:"2026-05-09"},
    prod:{start:"2026-06-01",end:"2026-07-14"},
    sc:"REV 1\u20137"},

  {g:"Lateness"},
  {n:"Late Detection + DPD Tracking",cat:"lateness",
    stg:{start:"2026-05-18",end:"2026-06-05"},
    prod:{start:"2026-06-16",end:"2026-07-30"},
    sc:"LAT 8\u201316, 2LAT 17\u201320"},
  {n:"1st Late Fee Application",cat:"lateness",
    stg:{start:"2026-05-18",end:"2026-06-05"},
    prod:{start:"2026-06-16",end:"2026-07-30"},
    sc:"LAT 8\u201316, 2LAT 17\u201320"},
  {n:"Late Fee $30 Cap Logic",cat:"lateness",
    stg:{start:"2026-06-01",end:"2026-06-05"},
    prod:{start:"2026-06-22",end:"2026-07-14"},
    sc:"LAT 15"},
  {n:"Late Fee Waiver",cat:"lateness",
    stg:{start:"2026-05-18",end:"2026-06-05"},
    prod:{start:"2026-06-26",end:"2026-07-30"},
    sc:"LAT 16, 2LAT 17\u201320"},
  {n:"2nd Late Fee (consecutive late)",cat:"lateness",
    stg:{start:"2026-05-18",end:"2026-05-28"},
    prod:{start:"2026-06-26",end:"2026-07-30"},
    sc:"2LAT 17\u201320"},

  {g:"Reversals"},
  {n:"Full Reversal (same cycle)",cat:"reversal",
    stg:{start:"2026-05-28",end:"2026-06-07"},
    prod:{start:"2026-07-05",end:"2026-07-30"},
    sc:"RVSL 21, 22, 23, 25"},
  {n:"Full Reversal (cross-cycle + prepaid)",cat:"reversal",
    stg:{start:"2026-06-03",end:"2026-06-07"},
    prod:{start:"2026-07-06",end:"2026-08-09"},
    sc:"RVSL 24, 26, 27"},
  {n:"Interest Reversal",cat:"reversal",
    stg:{start:"2026-06-03",end:"2026-06-07"},
    prod:{start:"2026-07-20",end:"2026-08-07"},
    sc:"RVSL 25, 29"},
  {n:"Partial Reversal",cat:"reversal",
    stg:{start:"2026-06-03",end:"2026-06-07"},
    prod:{start:"2026-07-15",end:"2026-08-07"},
    sc:"RVSL 28, 29"},

  {g:"Other"},
  {n:"Prepaid Balance Consumption",cat:"other",
    stg:{start:"2026-06-07",end:"2026-06-11"},
    prod:{start:"2026-07-25",end:"2026-08-07"},
    sc:"OTH 30"},
  {n:"Overlimit Handling",cat:"other",
    stg:{start:"2026-06-07",end:"2026-06-11"},
    prod:{start:"2026-07-16",end:"2026-07-29"},
    sc:"OTH 31"},
  {n:"Manual Financial Adjustment",cat:"other",
    stg:{start:"2026-06-07",end:"2026-06-11"},
    prod:{start:"2026-07-30",end:"2026-08-12"},
    sc:"OTH 32"}
];

var CAT_COLORS = {
  core:     {stg:"#2e7d32",prod:"#1565c0"},
  revolving:{stg:"#2e7d32",prod:"#1565c0"},
  lateness: {stg:"#2e7d32",prod:"#1565c0"},
  reversal: {stg:"#2e7d32",prod:"#1565c0"},
  other:    {stg:"#2e7d32",prod:"#1565c0"}
};

var CAT_DOTS = {
  core:"#78909c",revolving:"#2e7d32",lateness:"#546e7a",reversal:"#1565c0",other:"#b71c1c"
};

var T0=new Date(2026,3,7), T1=new Date(2026,7,15);
var PPD=14, ROW_H=48, CW=260;
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DN=["S","M","T","W","T","F","S"];
var catFilt="all", envFilt="both";

var HOL_BR={"2026-04-21":"Tiradentes","2026-05-01":"Labor Day BR","2026-06-04":"Corpus Christi"};
var HOL_US={"2026-05-25":"Memorial Day","2026-06-19":"Juneteenth","2026-07-03":"Independence Day (obs)"};

function pad2(n){return n<10?"0"+n:String(n)}
function dayKey(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())}
function dayType(d){
  var k=dayKey(d);
  if(HOL_BR[k])return"br";if(HOL_US[k])return"us";
  var dow=d.getDay();if(dow===0||dow===6)return"we";return null;
}
function dayLabel(d){var k=dayKey(d);return HOL_BR[k]||HOL_US[k]||null}
function dBetween(a,b){return Math.round((b-a)/864e5)}
function pD(s){var p=s.split("-");return new Date(+p[0],p[1]-1,+p[2])}
function fmt(d){return MN[d.getMonth()]+" "+d.getDate()}
function fmtFull(d){return MN[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear()}
function nDays(){return dBetween(T0,T1)+1}
function tW(){return nDays()*PPD}

function getFiltered(){
  var out=[];
  for(var i=0;i<FEATURES.length;i++){
    var f=FEATURES[i];
    if(f.g){out.push(f);continue;}
    if(catFilt!=="all"&&f.cat!==catFilt)continue;
    out.push(f);
  }
  var clean=[];
  for(var j=0;j<out.length;j++){
    if(out[j].g){
      if(j+1<out.length&&!out[j+1].g)clean.push(out[j]);
      else if(j+1>=out.length)continue;
      else continue;
    }else{clean.push(out[j])}
  }
  return clean;
}

function render(){
  var sc=document.getElementById("sc"),list=getFiltered(),w=tW();
  if(!list.length){sc.innerHTML='<div style="padding:40px;text-align:center;color:#90a4ae">No features to display.</div>';return}
  var html='<div class="chart-inner" style="width:'+(CW+w)+'px">';

  html+='<div class="header-band"><div class="corner">System Feature</div><div class="date-cols" style="width:'+w+'px">';
  html+='<div class="month-row">';
  var spans=[],cur=new Date(T0),pm=-1,ms=0;
  while(cur<=T1){var mo=cur.getMonth();if(mo!==pm){if(pm!==-1)spans.push({m:pm,y:cur.getFullYear(),s:ms,e:dBetween(T0,cur)});ms=dBetween(T0,cur);pm=mo}cur.setDate(cur.getDate()+1)}
  spans.push({m:pm,y:T1.getFullYear(),s:ms,e:nDays()});
  for(var si=0;si<spans.length;si++)html+='<div class="month-cell" style="width:'+((spans[si].e-spans[si].s)*PPD)+'px">'+MN[spans[si].m]+' '+spans[si].y+'</div>';
  html+='</div><div class="wday-row">';
  cur=new Date(T0);while(cur<=T1){var dt0=dayType(cur),wdcls="wday-cell";if(dt0)wdcls+=" wc-"+dt0;
  html+='<div class="'+wdcls+'" style="width:'+PPD+'px">'+DN[cur.getDay()]+'</div>';cur.setDate(cur.getDate()+1)}
  html+='</div><div class="day-row">';
  cur=new Date(T0);while(cur<=T1){var isMS=cur.getDate()===1;
  var dt=dayType(cur),dcls=isMS?"week-cell mon-start":"week-cell";if(dt)dcls+=" wc-"+dt;
  var dtip=dayLabel(cur);var dtipAttr=dtip?' title="'+dtip+'"':'';
  html+='<div class="'+dcls+'"'+dtipAttr+' style="width:'+PPD+'px">'+cur.getDate()+'</div>';cur.setDate(cur.getDate()+1)}
  html+='</div></div></div>';

  for(var i=0;i<list.length;i++){
    var f=list[i];
    if(f.g){
      html+='<div class="group-sep"><div class="group-sep-left">'+f.g+'</div><div class="group-sep-right" style="width:'+w+'px"></div></div>';
      continue;
    }

    var h=ROW_H;
    html+='<div class="feat-row"><div class="feat-label" style="height:'+h+'px"><span class="cat-dot" style="background:'+CAT_DOTS[f.cat]+'"></span>'+f.n+'</div>';
    html+='<div class="feat-gantt" style="width:'+w+'px;height:'+h+'px">';

    cur=new Date(T0);while(cur<=T1){var dd=dBetween(T0,cur);var dty=dayType(cur);
    if(dty==="we")html+='<div class="day-bg bg-we" style="left:'+(dd*PPD)+'px;width:'+PPD+'px"></div>';
    else if(dty)html+='<div class="day-mark dm-'+dty+'" style="left:'+(dd*PPD+Math.floor(PPD/2))+'px"></div>';
    if(cur.getDate()===1)html+='<div class="gridline gl-month" style="left:'+(dd*PPD)+'px"></div>';
    else if(cur.getDay()===1)html+='<div class="gridline gl-week" style="left:'+(dd*PPD)+'px"></div>';
    cur.setDate(cur.getDate()+1)}

    var today=new Date();
    var todayOff=dBetween(T0,today);
    if(todayOff>=0&&todayOff<nDays()){
      html+='<div class="today-line" style="left:'+(todayOff*PPD+Math.floor(PPD/2))+'px"></div>';
    }

    if(envFilt!=="prod"&&f.stg){
      var ss=pD(f.stg.start),se=pD(f.stg.end);
      var sOff=dBetween(T0,ss),sSpan=dBetween(ss,se)+1;
      var sLeft=sOff*PPD,sW=Math.max(sSpan*PPD-2,16);
      html+='<div class="bar" style="left:'+sLeft+'px;width:'+sW+'px;top:6px;background:rgba(206,147,216,.3);border:2px solid #ce93d8;color:#6a1b9a"'
        +' data-n="'+f.n.replace(/"/g,"&quot;")+'" data-env="STG" data-start="'+fmtFull(ss)+'" data-end="'+fmtFull(se)+'" data-sc="'+f.sc.replace(/"/g,"&quot;")+'" data-cat="'+f.cat+'">'
        +'<span class="bt">STG: '+fmt(ss)+'</span></div>';
    }

    if(envFilt!=="stg"&&f.prod){
      var ps=pD(f.prod.start),pe=pD(f.prod.end);
      var pOff=dBetween(T0,ps),pSpan=dBetween(ps,pe)+1;
      var pLeft=pOff*PPD,pW=Math.max(pSpan*PPD-2,16);
      html+='<div class="bar" style="left:'+pLeft+'px;width:'+pW+'px;top:'+26+'px;background:rgba(106,27,154,.2);border:2px solid #6a1b9a;color:#4a148c"'
        +' data-n="'+f.n.replace(/"/g,"&quot;")+'" data-env="PROD" data-start="'+fmtFull(ps)+'" data-end="'+fmtFull(pe)+'" data-sc="'+f.sc.replace(/"/g,"&quot;")+'" data-cat="'+f.cat+'">'
        +'<span class="bt">PROD: '+fmt(ps)+'</span></div>';
    }

    html+='</div></div>';
  }

  html+='</div>';sc.innerHTML=html;
}

var tt=document.getElementById("tt");
function showTT(el){
  var d=el.dataset;if(!d.n)return;
  var catNames={core:"Core Billing",revolving:"Revolving",lateness:"Lateness",reversal:"Reversals",other:"Other"};
  tt.innerHTML='<div class="tl">'+d.n+'</div>'
    +'<div class="tc">'+d.env+' \u00b7 '+(catNames[d.cat]||d.cat)+'</div>'
    +'<div class="td">Deadline: '+d.start+'</div>'
    +'<div class="td">Testing window ends: '+d.end+'</div>'
    +'<div class="ts"><b>Dependent scenarios:</b> '+d.sc+'</div>';
  tt.style.display="block";
}
document.addEventListener("pointerover",function(e){
  var b=e.target.closest(".bar");
  if(!b){tt.style.display="none";return}
  showTT(b);
});
document.addEventListener("pointermove",function(e){
  if(tt.style.display!=="block")return;
  var x=e.clientX+14,y=e.clientY+14;
  if(x+tt.offsetWidth>innerWidth-10)x=e.clientX-tt.offsetWidth-10;
  if(y+tt.offsetHeight>innerHeight-10)y=e.clientY-tt.offsetHeight-10;
  tt.style.left=x+"px";tt.style.top=y+"px";
});
document.addEventListener("pointerout",function(e){
  var t=e.target.closest(".bar");
  if(t&&!e.relatedTarget?.closest(".bar"))tt.style.display="none";
});

document.querySelectorAll("[data-cat]").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll("[data-cat]").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");catFilt=btn.dataset.cat;render();
  });
});
document.querySelectorAll("[data-env]").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll("[data-env]").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");envFilt=btn.dataset.env;render();
  });
});

render();
</script>
</body>
</html>
